<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      body {
        width: 280px;
        padding: 14px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #0f172a;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 10px;
      }
      label {
        display: block;
        margin: 9px 0 4px;
        font-size: 12px;
        color: #475569;
      }
      input, select, button {
        box-sizing: border-box;
        width: 100%;
        font: inherit;
      }
      input, select {
        padding: 7px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
      }
      button {
        margin-top: 10px;
        padding: 9px;
        border: 0;
        border-radius: 6px;
        background: #2563eb;
        color: white;
        cursor: pointer;
        font-weight: 650;
      }
      button.secondary {
        background: #475569;
      }
      #status {
        margin-top: 10px;
        font-size: 12px;
        color: #64748b;
        min-height: 32px;
      }
    </style>
  </head>
  <body>
    <h1>Kingdomino Advisor</h1>

    <label for="engine">Engine</label>
    <select id="engine">
      <option value="auto">Auto endgame</option>
      <option value="nn">NN/MCTS</option>
      <option value="exact">Exact solver</option>
      <option value="greedy">Greedy debug</option>
      <option value="random">Random debug</option>
    </select>

    <label for="sims">Simulations</label>
    <input id="sims" type="number" min="1" max="5000" step="50">

    <label><input id="streaming" type="checkbox" style="width:auto"> Stream NN search</label>

    <label for="maxSims">Streaming simulation cap</label>
    <input id="maxSims" type="number" min="1" max="100000" step="100">

    <label for="refreshMs">Refresh milliseconds</label>
    <input id="refreshMs" type="number" min="100" max="10000" step="100">

    <label for="fragilityAtSims">Test fragility at main sims (0 disables)</label>
    <input id="fragilityAtSims" type="number" min="0" max="20000" step="100">

    <label for="fragilitySims">Fragility mini-search sims</label>
    <input id="fragilitySims" type="number" min="50" max="20000" step="50">

    <label for="checkpoint">Checkpoint path</label>
    <input id="checkpoint" type="text" placeholder="blank uses server default">

    <label for="exactMaxSecs">Exact max seconds</label>
    <input id="exactMaxSecs" type="number" min="0" max="3600" step="10">

    <label for="exactThreads">Exact CPU threads</label>
    <input id="exactThreads" type="number" min="0" max="128" step="1" placeholder="0 = all logical CPUs">

    <button id="captureBtn">Capture and Recommend</button>
    <button id="debugBtn" class="secondary">Capture Debug Only</button>
    <button id="probeBtn" class="secondary">Save Last Probe</button>
    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
